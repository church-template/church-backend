spring:
  application:
    name: church-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/church_db}
    username: ${DB_USERNAME:church_user}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  servlet:
    multipart:
      # FileStorage가 FILE_MAX_SIZE를 권위 한도로 검증한다. 서블릿 한도도 같은 값으로 맞춰,
      # 초과 업로드는 MaxUploadSizeExceededException → 413 FILE_SIZE_EXCEEDED로 통일한다(GlobalExceptionHandler).
      max-file-size: ${FILE_MAX_SIZE:10485760}
      max-request-size: ${FILE_MAX_SIZE:10485760}

server:
  # 리버스 프록시(Caddy/nginx) 뒤 배포 전제 — X-Forwarded-* 신뢰해 https/host를 올바르게 인식.
  # springdoc servers URL·리다이렉트 등 절대 URL이 https로 생성된다. 8080 직접 노출 금지가 전제.
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /docs/swagger-ui.html

# 커스텀 설정 — 이번 이슈는 바인딩만, 실제 사용은 이후 이슈(#3·#4·#5·#6)
jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY:3600}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:1209600}
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}
  base-url: ${FILE_BASE_URL:http://localhost:8080/api/media}
  max-size: ${FILE_MAX_SIZE:10485760}
admin:
  bootstrap:
    phone: ${ADMIN_PHONE:}
    name: ${ADMIN_NAME:}
    password: ${ADMIN_PASSWORD:}
cache:
  ttl: ${CACHE_TTL:60} # 캐시 TTL(초). /api/main 통합 조회 캐싱(스펙 §9)
view:
  flush-interval: ${VIEW_FLUSH_INTERVAL:60000} # 조회수 버퍼 → DB 반영 주기(ms, 스펙 §9)
app:
  timezone: ${APP_TIMEZONE:Asia/Seoul} # 통독 챌린지 "오늘" 판정 기준 시간대(설계 §5)
